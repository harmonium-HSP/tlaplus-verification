name: Chaos Tests

on:
  pull_request:
    branches: [ main, develop ]
  push:
    branches: [ main ]
  schedule:
    - cron: '0 2 * * *'

jobs:
  chaos-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          check-latest: true

      - name: Install dependencies
        run: go mod tidy

      - name: Run unit tests
        run: go test -v -race ./pkg/redlock/... -run "TestSingle|TestTwo|TestLock|TestPartial|TestFencing"

      - name: Run chaos tests with race detection
        run: go test -v -race -count=10 ./pkg/redlock/... -run "TestChaos"

      - name: Run all tests with coverage
        run: go test -v -race -coverprofile=coverage.out -covermode=atomic ./pkg/redlock/...

      - name: Upload coverage report
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.out
          flags: chaos-tests

  tla-verify:
    runs-on: ubuntu-latest
    needs: chaos-tests
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'adopt'

      - name: Download TLA+ tools
        run: |
          wget -q https://github.com/tlaplus/tlaplus/releases/download/v1.8.0/tla2tools.jar

      - name: Run TLA+ verification
        run: java -cp tla2tools.jar tlc.TLC -config models/redlock/redlock_optimized.cfg models/redlock/redlock_optimized.tla

      - name: Performance regression check
        run: .github/scripts/check-performance.sh

  notify:
    runs-on: ubuntu-latest
    needs: [chaos-tests, tla-verify]
    if: failure()
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

