      - name: Update Confluence
        if: always() && env.CONFLUENCE_BASE_URL
        env:
          CONFLUENCE_BASE_URL: ${{ secrets.CONFLUENCE_BASE_URL }}
          CONFLUENCE_USERNAME: ${{ secrets.CONFLUENCE_USERNAME }}
          CONFLUENCE_API_TOKEN: ${{ secrets.CONFLUENCE_API_TOKEN }}
          CONFLUENCE_SPACE_KEY: ${{ secrets.CONFLUENCE_SPACE_KEY }}
        run: |
          chmod +x .github/scripts/update-confluence.sh
          if [ "${{ steps.tlc.outputs.all_passed }}" == "true" ]; then
            .github/scripts/update-confluence.sh "$CONFLUENCE_SPACE_KEY" "PASS" "" ""
          else
            .github/scripts/update-confluence.sh "$CONFLUENCE_SPACE_KEY" "FAIL" \
              "${{ steps.tlc.outputs.failed_models }}" \
              "${{ steps.tlc.outputs.failed_details }}"
          fi

      - name: Update baseline on main
        if: github.ref == 'refs/heads/main' && steps.tlc.outputs.all_passed == 'true'
        run: |
          chmod +x .github/scripts/update-baseline.sh
          .github/scripts/update-baseline.sh model-baseline.json
          
          # Commit and push baseline update
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "GitHub Actions"
          git add model-baseline.json
          git diff --quiet && git diff --staged --quiet || git commit -m "Update performance baseline"
          git push
