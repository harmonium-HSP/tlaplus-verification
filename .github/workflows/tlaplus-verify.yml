name: TLA+ Model Verification

on:
  pull_request:
    paths:
      - '**.tla'
      - '**.cfg'
      - '.github/workflows/tlaplus-verify.yml'
  push:
    branches:
      - main
    paths:
      - '**.tla'
      - '**.cfg'
  schedule:
    - cron: '0 0 * * *'

jobs:
  verify:
    runs-on: ubuntu-latest
    name: TLA+ Model Check
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Java
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Download TLA+ tools
        run: |
          mkdir -p /tmp/tlaplus
          curl -L -o /tmp/tlaplus/tla2tools.jar https://github.com/tlaplus/tlaplus/releases/download/v1.8.0/tla2tools.jar
          echo "TLA_TOOLS_PATH=/tmp/tlaplus/tla2tools.jar" >> $GITHUB_ENV

      - name: Find TLA+ models
        id: find_models
        run: |
          MODELS=$(find . -name "*.tla" -type f | grep -v ".git" | sort)
          echo "models<<EOF" >> $GITHUB_OUTPUT
          echo "$MODELS" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Run TLC model checker
        id: tlc
        continue-on-error: true
        timeout-minutes: 5
        run: |
          mkdir -p /tmp/tlc-results
          IFS=$'\n'
          FAILED_MODELS=""
          FAILED_DETAILS=""
          ALL_PASSED="true"
          
          for MODEL in $(echo "${{ steps.find_models.outputs.models }}" | tr ' ' '\n'); do
            echo "🔍 Verifying $MODEL..."
            CONFIG_FILE="${MODEL%.tla}.cfg"
            OUTPUT_FILE="/tmp/tlc-results/$(basename $MODEL).log"
            
            if [ -f "$CONFIG_FILE" ]; then
              java -cp $TLA_TOOLS_PATH tlc2.TLC -config "$CONFIG_FILE" "$MODEL" 2>&1 | tee "$OUTPUT_FILE"
            else
              java -cp $TLA_TOOLS_PATH tlc2.TLC "$MODEL" 2>&1 | tee "$OUTPUT_FILE"
            fi
            
            EXIT_CODE=${PIPESTATUS[0]}
            if [ $EXIT_CODE -ne 0 ]; then
              FAILED_MODELS="$FAILED_MODELS\n- $MODEL"
              ALL_PASSED="false"
              ERROR_LINE=$(grep -m 1 "Error:" "$OUTPUT_FILE" || echo "Unknown error")
              FAILED_DETAILS="$FAILED_DETAILS\n$MODEL: $ERROR_LINE"
              echo "❌ Verification failed for $MODEL"
            else
              echo "✅ Verification passed for $MODEL"
            fi
          done
          
          echo "all_passed=$ALL_PASSED" >> $GITHUB_OUTPUT
          echo "failed_models=$FAILED_MODELS" >> $GITHUB_OUTPUT
          echo "failed_details=$FAILED_DETAILS" >> $GITHUB_OUTPUT
          
          if [ "$ALL_PASSED" = "false" ]; then
            exit 1
          fi

      - name: Upload verification logs
        uses: actions/upload-artifact@v4
        with:
          name: tlc-output
          path: |
            *.out
            *.log
            *.te
          retention-days: 7
        if: failure()

