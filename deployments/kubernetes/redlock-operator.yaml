apiVersion: v1
kind: Namespace
metadata:
  name: redlock-operator
---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: redlockclusters.redlock.example.com
spec:
  group: redlock.example.com
  names:
    kind: RedlockCluster
    listKind: RedlockClusterList
    plural: redlockclusters
    singular: redlockcluster
    shortNames:
    - rlc
  scope: Namespaced
  versions:
    - name: v1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                size:
                  type: integer
                  minimum: 1
                image:
                  type: string
                enableFencing:
                  type: boolean
                lockTTL:
                  type: integer
                persistence:
                  type: object
                  properties:
                    enabled:
                      type: boolean
                    size:
                      type: string
            status:
              type: object
              properties:
                phase:
                  type: string
                readyReplicas:
                  type: integer
                currentReplicas:
                  type: integer
                leader:
                  type: string
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: redlock-operator
  namespace: redlock-operator
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: redlock-operator
rules:
- apiGroups: ["redlock.example.com"]
  resources: ["redlockclusters", "redlockclusters/status", "redlockclusters/finalizers"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
- apiGroups: ["apps"]
  resources: ["statefulsets"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
- apiGroups: [""]
  resources: ["services", "configmaps", "persistentvolumeclaims"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
- apiGroups: [""]
  resources: ["events"]
  verbs: ["create", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: redlock-operator
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: redlock-operator
subjects:
- kind: ServiceAccount
  name: redlock-operator
  namespace: redlock-operator
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redlock-operator
  namespace: redlock-operator
spec:
  replicas: 1
  selector:
    matchLabels:
      name: redlock-operator
  template:
    metadata:
      labels:
        name: redlock-operator
    spec:
      serviceAccountName: redlock-operator
      containers:
      - name: redlock-operator
        image: redlock-operator:latest
        ports:
        - containerPort: 8080
          name: metrics
        - containerPort: 8081
          name: health
        env:
        - name: WATCH_NAMESPACE
          value: ""
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: OPERATOR_NAME
          value: "redlock-operator"
        resources:
          limits:
            cpu: 100m
            memory: 128Mi
          requests:
            cpu: 100m
            memory: 64Mi
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8081
          initialDelaySeconds: 15
          periodSeconds: 20
        readinessProbe:
          httpGet:
            path: /readyz
            port: 8081
          initialDelaySeconds: 5
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: redlock-operator-metrics
  namespace: redlock-operator
spec:
  selector:
    name: redlock-operator
  ports:
  - name: metrics
    port: 8080
    targetPort: metrics
