SPECIFICATION Spec
INVARIANT Safety
PROPERTY Liveness

CONSTANTS
    Acceptors = {"A1", "A2", "A3"}
    Proposers = {"P1", "P2"}
    Values = {"v1", "v2"}
    MaxBallot = 5

SYMMETRY Acceptors
SYMMETRY Proposers

VIEW "Paxos Verification" {
    promised: (acceptor) => promised[acceptor]
    accepted: (acceptor) => accepted[acceptor]
    chosen: () => chosen
    lastBallot: (proposer) => lastBallot[proposer]
}

CONSTRAINT Cardinality(chosen) <= 1
