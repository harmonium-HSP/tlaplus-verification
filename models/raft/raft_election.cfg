SPECIFICATION Spec
INVARIANT Safety
PROPERTY Liveness

CONSTANTS
    Nodes = {"N1", "N2", "N3"}
    MaxTerm = 3
    TimeoutRange = 1..5

SYMMETRY Nodes

VIEW "Raft Election Verification" {
    currentTerm: (node) => currentTerm[node]
    role: (node) => role[node]
    votedFor: (node) => votedFor[node]
    votesReceived: (node) => Cardinality(votesReceived[node])
}
