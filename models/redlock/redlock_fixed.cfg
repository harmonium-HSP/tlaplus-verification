SPECIFICATION Next
INIT Init
INVARIANT Inv
PROPERTIES LockEventuallyAvailable StarvationFreedom

CONSTANTS
    Clients = {"C1", "C2"}
    Instances = {"I1", "I2", "I3", "I4", "I5"}
    LockDuration = 3
    MaxTokens = 10

SYMMETRY Clients

CONSTRAINT MaxTokens = 10
CONSTRAINT Cardinality(Clients) = 2
CONSTRAINT Cardinality(Instances) = 5

\* 状态限制
STATE_CONSTRAINT
    \A i \in Instances : token[i] <= MaxTokens

\* 强公平性条件
FAIRNESS
    \A client \in Clients : SF_pc(client)
